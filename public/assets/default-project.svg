<svg xmlns="http://www.w3.org/2000/svg" width="282" height="180" viewBox="0 0 282 180">
  <!-- Background -->
  <rect width="282" height="180" rx="8" fill="#1a1a2e"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="282" y2="60" stroke="#a970ff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="120" x2="282" y2="120" stroke="#a970ff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="94" y1="0" x2="94" y2="180" stroke="#a970ff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="188" y1="0" x2="188" y2="180" stroke="#a970ff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Glow circle behind icon -->
  <circle cx="141" cy="82" r="38" fill="#a970ff" fill-opacity="0.08"/>

  <!-- Code bracket icon -->
  <!-- < -->
  <polyline points="115,62 100,82 115,102" fill="none" stroke="#a970ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- > -->
  <polyline points="167,62 182,82 167,102" fill="none" stroke="#a970ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / -->
  <line x1="152" y1="60" x2="130" y2="104" stroke="#56cfcf" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Label -->
  <text x="141" y="145" font-family="'Sora', 'Segoe UI', sans-serif" font-size="12" fill="#b0aecd" text-anchor="middle" letter-spacing="1">sem imagem</text>
</svg>
